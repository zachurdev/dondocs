<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f33;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#navyGrad)" stroke="#c9a227" stroke-width="8"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.5"/>
  <!-- Document icon -->
  <g transform="translate(156, 120)">
    <!-- Document background -->
    <rect x="0" y="0" width="200" height="260" rx="8" fill="#ffffff" opacity="0.95"/>
    <!-- Document fold -->
    <path d="M160 0 L200 40 L160 40 Z" fill="#e0e0e0"/>
    <!-- Header lines -->
    <rect x="30" y="30" width="80" height="8" fill="#1e3a5f"/>
    <rect x="30" y="48" width="140" height="4" fill="#c9a227"/>
    <!-- Body lines -->
    <rect x="30" y="80" width="140" height="6" rx="3" fill="#1e3a5f" opacity="0.3"/>
    <rect x="30" y="100" width="140" height="6" rx="3" fill="#1e3a5f" opacity="0.3"/>
    <rect x="30" y="120" width="120" height="6" rx="3" fill="#1e3a5f" opacity="0.3"/>
    <rect x="30" y="150" width="140" height="6" rx="3" fill="#1e3a5f" opacity="0.3"/>
    <rect x="30" y="170" width="100" height="6" rx="3" fill="#1e3a5f" opacity="0.3"/>
    <!-- Signature area -->
    <rect x="80" y="210" width="90" height="4" fill="#1e3a5f"/>
    <rect x="90" y="224" width="70" height="3" fill="#1e3a5f" opacity="0.6"/>
  </g>
  <!-- Anchor accent -->
  <g transform="translate(380, 350) scale(0.8)">
    <path d="M40 0 L40 60 M20 20 L60 20 M10 60 Q40 80 70 60"
          fill="none" stroke="#c9a227" stroke-width="6" stroke-linecap="round"/>
    <circle cx="40" cy="0" r="12" fill="none" stroke="#c9a227" stroke-width="6"/>
  </g>
</svg>
